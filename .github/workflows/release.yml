name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  linux-x86_64:
    name: Build Linux x86_64 release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: rustup toolchain install stable --profile minimal

      - name: Build
        run: cargo build --release --locked

      - name: Package
        run: |
          install -Dm755 target/release/ais dist/ais-linux-x86_64
          sha256sum dist/ais-linux-x86_64 > dist/ais-linux-x86_64.sha256

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --notes "Linux x86_64 release for ${GITHUB_REF_NAME}." \
            dist/ais-linux-x86_64 \
            dist/ais-linux-x86_64.sha256
